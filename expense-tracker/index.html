<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boris Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Boris Expense Tracker</h1>

    <div>
        <label>Expense Name</label><br>
        <input type="text" id="expenseName" placeholder="e.g. Food">
    </div>

    <br>

    <div>
        <label>Amount</label><br>
        <input type="number" id="expenseAmount" placeholder="e.g. 3000 XAF">
    </div>

    <br>

    <button>Add Expense</button>
    <button>Clear All</button>

    <h2>Total: <span>0</span></h2>

    <h3>Expenses</h3>
    <ul>
        <!-- Expenses will appear here -->
    </ul>

    <script src="script.js"></script>
</body>
</html>
